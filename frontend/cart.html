<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELORA | Cart</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>

    <main class="page-shell">

        <section class="hero-section contact-hero">

            <nav class="top-nav">
                <a href="/" class="logo">Velora</a>

                <div class="top-links">
                    <a href="/">HOME</a>
                    <a href="/shop">SHOP</a>
                    <a href="/trending">TRENDING</a>
                    <a href="/contact">CONTACT</a>
                    <a href="/cart" class="cart active" aria-label="Cart">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M6 8h12l-1 12H7L6 8Z" stroke="currentColor" stroke-width="1.7"/>
                            <path d="M9 8V6a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.7"/>
                        </svg>
                    </a>
                </div>
            </nav>

            <div class="hero-center">
                <h1>YOUR BAG.</h1>
                <p>Your selected products will appear here.</p>
            </div>

        </section>

        <section class="contact-section">
            <div class="contact-card">
                <div class="contact-left">
                    <span class="section-kicker">CHECKOUT</span>
                    <h2>Your bag is empty</h2>
                    <p>
                        Product checkout will be connected later through Shopify or Stripe.
                        For now, this page completes the shopping flow.
                    </p>
                </div>

                <form class="contact-form">
                    <button type="button">CONTINUE SHOPPING</button>
                </form>
            </div>
        </section>

    </main>

</body>
</html>
