<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varukorg - VELORA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page-shell">
        <section class="hero-section" style="height:auto;padding-bottom:30px;min-height:unset;">
            <nav class="top-nav">
                <a href="index.html" class="logo">Velora</a>
                <div class="top-links">
                    <a href="index.html">HOME</a>
                    <a href="shop.html">SHOP</a>
                    <a href="trending.html">TRENDING</a>
                    <a href="contact.html">CONTACT</a>
                    <a href="checkout.html" class="cart active" aria-label="Cart">
                        <svg viewBox="0 0 24 24" fill="none"><path d="M6 8h12l-1 12H7L6 8Z" stroke="currentColor" stroke-width="1.7"/><path d="M9 8V6a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.7"/></svg>
                        <span class="cart-count">0</span>
                    </a>
                </div>
            </nav>
        </section>

        <section class="checkout-page">
            <div class="checkout-container">
                <h1 class="checkout-title">DIN VARUKORG</h1>

                <div id="emptyCart" style="display:none;text-align:center;padding:60px 0;">
                    <i class="fas fa-shopping-bag" style="font-size:3rem;color:#ccc;margin-bottom:20px;display:block;"></i>
                    <h2 style="font-family:'Cormorant Garamond',serif;margin-bottom:12px;">Din varukorg är tom</h2>
                    <p style="color:#888;margin-bottom:24px;">Lägg till några produkter för att fortsätta handla.</p>
                    <a href="shop.html" class="outline-btn">SE PRODUKTER</a>
                </div>

                <div id="cartContent" class="checkout-content" style="display:none;">
                    <div class="checkout-form-section" id="cartItems"></div>
                    <aside class="order-summary">
                        <h2>DIN BESTÄLLNING</h2>
                        <div id="orderItems"></div>
                        <div class="order-totals">
                            <div class="subtotal"><span>Delsumma</span><span id="subtotalAmount">$0.00</span></div>
                            <div class="shipping-cost"><span>Frakt</span><span>$4.99</span></div>
                            <div class="total"><span>Totalt</span><span id="totalAmount">$0.00</span></div>
                        </div>
                        <button class="btn-checkout" onclick="goToShopify()">SLUTFÖR KÖP</button>
                        <p class="secure-checkout"><i class="fas fa-lock"></i> Säker betalning via Shopify</p>
                    </aside>
                </div>
            </div>
        </section>
    </main>

    <script src="products.js"></script>
    <script src="script.js"></script>
    <script>
    function renderCart() {
        var cart = JSON.parse(localStorage.getItem('veloraCart')) || [];
        var emptyCart = document.getElementById('emptyCart');
        var cartContent = document.getElementById('cartContent');

        if (cart.length === 0) {
            emptyCart.style.display = 'block';
            cartContent.style.display = 'none';
            return;
        }

        emptyCart.style.display = 'none';
        cartContent.style.display = 'flex';

        document.getElementById('cartItems').innerHTML = cart.map(function(item) {
            return '<div style="display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid #f0f0f0;">' +
                '<img src="' + item.image + '" style="width:80px;height:80px;object-fit:cover;">' +
                '<div style="flex:1;"><h3 style="font-size:0.85rem;letter-spacing:0.08em;margin-bottom:4px;">' + item.name + '</h3>' +
                '<p style="color:#888;font-size:0.8rem;">$' + item.price + '.00</p></div>' +
                '<div style="display:flex;align-items:center;gap:12px;">' +
                '<button onclick="changeQty(' + item.id + ',-1)" style="width:28px;height:28px;border:1px solid #ddd;background:none;cursor:pointer;font-size:1rem;">−</button>' +
                '<span>' + item.quantity + '</span>' +
                '<button onclick="changeQty(' + item.id + ',1)" style="width:28px;height:28px;border:1px solid #ddd;background:none;cursor:pointer;font-size:1rem;">+</button></div>' +
                '<button onclick="removeItem(' + item.id + ')" style="background:none;border:none;cursor:pointer;color:#aaa;font-size:1.1rem;">✕</button></div>';
        }).join('');

        document.getElementById('orderItems').innerHTML = cart.map(function(item) {
            return '<div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:8px;">' +
                '<span>' + item.name + ' × ' + item.quantity + '</span>' +
                '<span>$' + (item.price * item.quantity).toFixed(2) + '</span></div>';
        }).join('');

        var subtotal = cart.reduce(function(sum, item) { return sum + item.price * item.quantity; }, 0);
        document.getElementById('subtotalAmount').textContent = '$' + subtotal.toFixed(2);
        document.getElementById('totalAmount').textContent = '$' + (subtotal + 4.99).toFixed(2);
    }

    function changeQty(productId, change) {
        var cart = JSON.parse(localStorage.getItem('veloraCart')) || [];
        var item = cart.find(function(i) { return i.id === productId; });
        if (!item) return;
        item.quantity += change;
        if (item.quantity <= 0) cart = cart.filter(function(i) { return i.id !== productId; });
        localStorage.setItem('veloraCart', JSON.stringify(cart));
        updateCartCount();
        renderCart();
    }

    function removeItem(productId) {
        var cart = (JSON.parse(localStorage.getItem('veloraCart')) || []).filter(function(i) { return i.id !== productId; });
        localStorage.setItem('veloraCart', JSON.stringify(cart));
        updateCartCount();
        renderCart();
    }

    function goToShopify() {
        var cart = JSON.parse(localStorage.getItem('veloraCart')) || [];
        if (cart.length === 0) return;
        var items = cart.map(function(item) { return item.shopifyId + ':' + item.quantity; }).join(',');
        window.location.href = 'https://velora-11488.myshopify.com/cart/' + items;
    }

    renderCart();
    </script>
</body>
</html>
